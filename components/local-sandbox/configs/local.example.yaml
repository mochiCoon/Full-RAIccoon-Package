vm:
  name: win-malware-lab
  snapshot: clean-guestadditions-sysmon
  guest_user: analyst
  guest_password: CHANGE_ME_GUEST_PASSWORD

network:
  interface: vboxnet0
  host_ip: 192.168.56.254
  guest_ip: 192.168.56.20

run:
  duration: 180
  password: CHANGE_ME_SAMPLE_ARCHIVE_PASSWORD
  stop_apache: true
  suricata: true
  memory_dump: false

analysis:
  vm: remnux
  vm_user: remnux
  vm_password: CHANGE_ME_ANALYSIS_VM_PASSWORD
  share_host: /opt/raiccoon/vm-shares/remnux-transfer
  share_guest: /media/sf_remnux_transfer
  service_ip: 192.168.56.1
  interface: enp0s3
  local_analysis_only: false
