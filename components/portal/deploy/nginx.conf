server {
    listen 443 ssl http2;
    server_name yourorg-portal.internal;

    # Replace with your internal certificate paths or your internal PKI deployment.
    ssl_certificate     /etc/ssl/yourorg-portal/fullchain.pem;
    ssl_certificate_key /etc/ssl/yourorg-portal/privkey.pem;

    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
