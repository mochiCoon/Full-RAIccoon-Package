# Starter only. Review OpenCTI upstream docs before production use.
services:
  opencti:
    image: opencti/platform:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - APP__PORT=8080
      - APP__BASE_URL=${OPENCTI_BASE_URL:-http://127.0.0.1:8080}
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL:-admin@example.org}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD:?set in local .env}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN:?set in local .env}
      - REDIS__HOST=redis
      - ELASTICSEARCH__URL=http://elasticsearch:9200
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - RABBITMQ__HOST=rabbitmq
    depends_on: [redis, elasticsearch, minio, rabbitmq]
  redis:
    image: redis:7
    restart: unless-stopped
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - esdata:/usr/share/elasticsearch/data
  minio:
    image: minio/minio:latest
    command: server /data
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-opencti}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?set in local .env}
    volumes:
      - miniodata:/data
  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-opencti}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:?set in local .env}
volumes:
  esdata:
  miniodata:
